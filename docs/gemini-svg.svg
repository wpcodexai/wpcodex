<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- LOGO ICON (Hexagon + Code Lines) -->
  <g transform="translate(15, 10)">
    <!-- Hexagon Outline -->
    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="#3858e9" stroke-width="7" stroke-linejoin="round"/>
    <!-- Terminal / Code Lines Inside -->
    <path d="M35,35 L45,45 L35,55" fill="none" stroke="#3858e9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="55" x2="70" y2="55" stroke="#1e1e1e" stroke-width="5" stroke-linecap="round"/>
    <line x1="35" y1="68" x2="60" y2="68" stroke="#1e1e1e" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- TYPOGRAPHY -->
  <g transform="translate(130, 75)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="50" font-weight="800" fill="#1e1e1e">WP<tspan fill="#3858e9" font-weight="300">Codex</tspan></text>
    <text x="245" y="-22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#1e1e1e" opacity="0.4">.AI</text>
  </g>
</svg>
